# Severino — database migrate and schema check.
#
# Trigger: severino-database-deploy (tag database-X.Y.Z)
#
# Set substitutions on the trigger (Secret Manager recommended for passwords):
#   _INSTANCE_CONNECTION_NAME — Cloud SQL instance (project:region:instance)
#   _DB_USER, _DB_PASS — Postgres user/password
#   _DB_NAME — database name (e.g. severino-service)
#
# IAM: severino-sa@ needs roles/cloudsql.client (Cloud Build runs as severino-sa).
#
# Root `.env` is not used in CI; DATABASE_URL is built from substitutions below.
# Cloud SQL has a public IP for Cloud Build migrations (proxy, IAM auth). Cloud Run uses the private connector.

substitutions:
  _CLOUD_SQL_PROXY_VERSION: 'v2.18.3'
  _PNPM_CACHE_OBJECT: cache/pnpm-store.tar.gz

steps:
  - id: restore-cache
    name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    dir: .
    entrypoint: bash
    args:
      - -ce
      - |
        CACHE_URI="gs://${PROJECT_ID}_cloudbuild/${_PNPM_CACHE_OBJECT}"
        if gcloud storage objects describe "$$CACHE_URI" --project="$PROJECT_ID" >/dev/null 2>&1; then
          gcloud storage cp "$$CACHE_URI" /tmp/pnpm-store.tar.gz
          mkdir -p .pnpm-store
          tar -xzf /tmp/pnpm-store.tar.gz -C .
        fi

  - id: install
    name: node:22-bookworm
    dir: .
    entrypoint: bash
    args:
      - -ce
      - |
        corepack enable
        corepack prepare pnpm@11.5.0 --activate
        pnpm config set store-dir /workspace/.pnpm-store
        pnpm install --frozen-lockfile

  - id: db-release
    name: node:22-bookworm
    dir: .
    entrypoint: bash
    args:
      - -ce
      - |
        set -euo pipefail

        curl -fsSL -o cloud-sql-proxy "https://storage.googleapis.com/cloud-sql-connectors/cloud-sql-proxy/${_CLOUD_SQL_PROXY_VERSION}/cloud-sql-proxy.linux.amd64"
        chmod +x cloud-sql-proxy
        ./cloud-sql-proxy --address 127.0.0.1 --port 5432 "${_INSTANCE_CONNECTION_NAME}" &
        PROXY_PID=$!
        trap 'kill $${PROXY_PID}' EXIT
        sleep 3

        export DATABASE_URL="postgresql://${_DB_USER}:${_DB_PASS}@127.0.0.1:5432/${_DB_NAME}"

        corepack enable
        corepack prepare pnpm@11.5.0 --activate
        pnpm config set store-dir /workspace/.pnpm-store

        pnpm --filter @severino/db run build

        pnpm run db:migrate
        pnpm run db:check

  - id: save-cache
    name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    dir: .
    waitFor: ['db-release']
    entrypoint: bash
    args:
      - -ce
      - |
        if [ -d .pnpm-store ] && [ "$(ls -A .pnpm-store 2>/dev/null)" ]; then
          tar -czf /tmp/pnpm-store.tar.gz .pnpm-store
          gcloud storage cp /tmp/pnpm-store.tar.gz "gs://${PROJECT_ID}_cloudbuild/${_PNPM_CACHE_OBJECT}" --project="$PROJECT_ID"
        fi

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'
