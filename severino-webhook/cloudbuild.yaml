# severino-webhook — Cloud Run (ingest + worker from one image)
#
# Trigger substitutions (set on the Cloud Build trigger):
#   _REGION                    — e.g. southamerica-east1
#   _AR_REPO                   — Artifact Registry repo name
#   _IMAGE_NAME                — e.g. severino-webhook
#   _INSTANCE_CONNECTION_NAME  — Cloud SQL instance (project:region:instance)
#   _DB_USER, _DB_PASS, _DB_NAME
#   _INGEST_SA                 — service account email for ingest
#   _WORKER_SA                 — service account email for worker
#   _PUBSUB_PUSHER_SA          — SA Pub/Sub uses for OIDC push to worker
#   _PUBSUB_TOPIC              — default: whatsapp-events
#   _PUBSUB_DLQ_TOPIC          — default: whatsapp-events-dlq
#   _PUBSUB_SUBSCRIPTION       — default: whatsapp-events-push
#
# Secrets (Secret Manager secret names, latest version):
#   _SECRET_WHATSAPP_APP_SECRET
#   _SECRET_WHATSAPP_VERIFY_TOKEN
#   _SECRET_DATABASE_URL       — optional; if unset, DATABASE_URL built from _DB_* via proxy

substitutions:
  _REGION: southamerica-east1
  _AR_REPO: severino
  _IMAGE_NAME: severino-webhook
  _PUBSUB_TOPIC: whatsapp-events
  _PUBSUB_DLQ_TOPIC: whatsapp-events-dlq
  _PUBSUB_SUBSCRIPTION: whatsapp-events-push
  _CLOUD_SQL_PROXY_VERSION: v2.18.3
  _INGEST_SERVICE: severino-webhook-ingest
  _WORKER_SERVICE: severino-webhook-worker

options:
  logging: CLOUD_LOGGING_ONLY

steps:
  - id: install
    name: node:22-bookworm
    entrypoint: bash
    args:
      - -ce
      - |
        corepack enable
        corepack prepare pnpm@9.15.4 --activate
        pnpm install --frozen-lockfile

  - id: db-release
    name: node:22-bookworm
    entrypoint: bash
    args:
      - -ce
      - |
        set -euo pipefail
        curl -fsSL -o cloud-sql-proxy \
          "https://storage.googleapis.com/cloud-sql-connectors/cloud-sql-proxy/${_CLOUD_SQL_PROXY_VERSION}/cloud-sql-proxy.linux.amd64"
        chmod +x cloud-sql-proxy
        ./cloud-sql-proxy --address 127.0.0.1 --port 5432 "${_INSTANCE_CONNECTION_NAME}" &
        PROXY_PID=$!
        trap 'kill ${PROXY_PID}' EXIT
        sleep 3

        export DATABASE_URL="postgresql://${_DB_USER}:${_DB_PASS}@127.0.0.1:5432/${_DB_NAME}"
        corepack enable
        corepack prepare pnpm@9.15.4 --activate
        pnpm --filter @severino/db run build
        pnpm run db:migrate
        pnpm run db:check

  - id: build-image
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_IMAGE_NAME}:$SHORT_SHA
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_IMAGE_NAME}:latest
      - -f
      - severino-webhook/Dockerfile
      - .

  - id: push-image
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - --all-tags
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_IMAGE_NAME}

  - id: deploy-worker
    name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: bash
    args:
      - -ce
      - |
        set -euo pipefail
        IMAGE="${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_IMAGE_NAME}:$SHORT_SHA"

        DB_SECRET_ARGS=""
        if [ -n "${_SECRET_DATABASE_URL:-}" ]; then
          DB_SECRET_ARGS="--set-secrets=DATABASE_URL=${_SECRET_DATABASE_URL}:latest"
        else
          DB_SECRET_ARGS="--set-env-vars=DATABASE_URL=postgresql://${_DB_USER}:${_DB_PASS}@/${_DB_NAME}?host=/cloudsql/${_INSTANCE_CONNECTION_NAME}"
        fi

        gcloud run deploy "${_WORKER_SERVICE}" \
          --project "$PROJECT_ID" \
          --region "${_REGION}" \
          --image "$IMAGE" \
          --platform managed \
          --no-allow-unauthenticated \
          --service-account "${_WORKER_SA}" \
          --add-cloudsql-instances "${_INSTANCE_CONNECTION_NAME}" \
          --concurrency 10 \
          --min-instances 0 \
          --max-instances 10 \
          --cpu 1 \
          --memory 512Mi \
          --port 8080 \
          --set-env-vars "SERVICE_ROLE=worker,NODE_ENV=production,GCP_PROJECT_ID=$PROJECT_ID" \
          $DB_SECRET_ARGS

        WORKER_URL="$(gcloud run services describe "${_WORKER_SERVICE}" \
          --project "$PROJECT_ID" \
          --region "${_REGION}" \
          --format 'value(status.url)')"

        gcloud run services update "${_WORKER_SERVICE}" \
          --project "$PROJECT_ID" \
          --region "${_REGION}" \
          --update-env-vars "PUBSUB_PUSH_AUDIENCE=${WORKER_URL}"

        echo "$WORKER_URL" > /workspace/worker_url.txt

  - id: wire-pubsub
    name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: bash
    args:
      - -ce
      - |
        set -euo pipefail
        WORKER_URL="$(cat /workspace/worker_url.txt)"

        gcloud pubsub topics create "${_PUBSUB_TOPIC}" --project "$PROJECT_ID" 2>/dev/null || true
        gcloud pubsub topics create "${_PUBSUB_DLQ_TOPIC}" --project "$PROJECT_ID" 2>/dev/null || true

        if gcloud pubsub subscriptions describe "${_PUBSUB_SUBSCRIPTION}" --project "$PROJECT_ID" >/dev/null 2>&1; then
          gcloud pubsub subscriptions update "${_PUBSUB_SUBSCRIPTION}" \
            --project "$PROJECT_ID" \
            --push-endpoint "${WORKER_URL}/pubsub/push" \
            --push-auth-service-account "${_PUBSUB_PUSHER_SA}" \
            --push-auth-token-audience "${WORKER_URL}"
        else
          gcloud pubsub subscriptions create "${_PUBSUB_SUBSCRIPTION}" \
            --project "$PROJECT_ID" \
            --topic "${_PUBSUB_TOPIC}" \
            --push-endpoint "${WORKER_URL}/pubsub/push" \
            --push-auth-service-account "${_PUBSUB_PUSHER_SA}" \
            --push-auth-token-audience "${WORKER_URL}" \
            --dead-letter-topic "${_PUBSUB_DLQ_TOPIC}" \
            --max-delivery-attempts 10 \
            --ack-deadline 30
        fi

  - id: deploy-ingest
    name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: bash
    args:
      - -ce
      - |
        set -euo pipefail
        IMAGE="${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_IMAGE_NAME}:$SHORT_SHA"

        INGEST_DB_ARGS=""
        if [ -n "${_SECRET_DATABASE_URL:-}" ]; then
          INGEST_DB_ARGS="--set-secrets=DATABASE_URL=${_SECRET_DATABASE_URL}:latest"
        else
          INGEST_DB_ARGS="--set-env-vars=DATABASE_URL=postgresql://${_DB_USER}:${_DB_PASS}@/${_DB_NAME}?host=/cloudsql/${_INSTANCE_CONNECTION_NAME}"
        fi

        gcloud run deploy "${_INGEST_SERVICE}" \
          --project "$PROJECT_ID" \
          --region "${_REGION}" \
          --image "$IMAGE" \
          --platform managed \
          --allow-unauthenticated \
          --service-account "${_INGEST_SA}" \
          --concurrency 80 \
          --min-instances 1 \
          --max-instances 20 \
          --cpu 1 \
          --memory 512Mi \
          --port 8080 \
          --set-env-vars "SERVICE_ROLE=ingest,NODE_ENV=production,GCP_PROJECT_ID=$PROJECT_ID,PUBSUB_TOPIC=${_PUBSUB_TOPIC},PUBLISHER_MODE=pubsub" \
          --set-secrets "WHATSAPP_APP_SECRET=${_SECRET_WHATSAPP_APP_SECRET}:latest,WHATSAPP_VERIFY_TOKEN=${_SECRET_WHATSAPP_VERIFY_TOKEN}:latest" \
          $INGEST_DB_ARGS \
          --add-cloudsql-instances "${_INSTANCE_CONNECTION_NAME}"

images:
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_IMAGE_NAME}:$SHORT_SHA
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_IMAGE_NAME}:latest
